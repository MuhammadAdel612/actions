on:
   workflow_dispatch:
   
jobs:
   job1:
     runs-on: ubuntu-latest
     outputs:
       myvalue: ${{ steps.step1.outputs.value }}
     steps:
      - id: step1
        run: echo "value=hello" >> $GITHUB_OUTPUT
   job2:
     runs-on: ubuntu-latest
     needs: job1
     steps:
     - run: echo "${{ needs.job1.outputs.myvalue }}"
