on:
   workflow_dispatch:
    inputs:
     name:
       description: "Your name"
       required: true
jobs:
   test:
     runs-on: ubuntu-latest
     steps:
       - run: echo "Hello ${{ inputs.name }}"
   job1:
     runs-on: ubuntu-latest
     outputs:
       myvalue: ${{ steps.step1.outputs.value }}
     steps:
      - id: step1
      run: echo "value=hello" >> $GITHUB_OUTPUT
   job2:
     runs-on: ubuntu-latest
     needs: job1
     steps:
     - run: echo "${{ needs.job1.outputs.myvalue }}"
